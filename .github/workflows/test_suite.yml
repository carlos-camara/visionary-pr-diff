---
name: 🧪 Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Jest Suite
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7

      - name: 🏗️ Setup Environment
        uses: carlos-camara/qa-hub-actions/setup-environment@main
        with:
          node-version: '20'

      - name: 🧪 Run Tests
        uses: carlos-camara/qa-hub-actions/run-tests@main
        with:
          test-command-api: 'npm test'
          project-name: 'visionary-pr-diff'
